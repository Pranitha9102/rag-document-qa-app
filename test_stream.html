<!DOCTYPE html>
<html>
<body>
<h2>RAG Streaming Test</h2>
<input id="q" style="width:400px" value="How do you get repository information from GitHub?"/>
<button onclick="ask()">Ask</button>
<pre id="out" style="white-space:pre-wrap;font-family:sans-serif"></pre>

<script>
async function ask() {
  const out = document.getElementById("out");
  out.textContent = "";
  const res = await fetch("http://127.0.0.1:8000/ask/stream", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({query: document.getElementById("q").value, top_k: 3})
  });
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buffer += decoder.decode(value);
    const lines = buffer.split("\n\n");
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      const payload = line.slice(6);
      if (payload === "[DONE]") return;
      const msg = JSON.parse(payload);
      if (msg.type === "token") out.textContent += msg.content;
      if (msg.type === "citations") out.textContent += "Citations: " + JSON.stringify(msg.content) + "\n\n";
      if (msg.type === "answer") out.textContent += msg.content;
    }
  }
}
</script>
</body>
</html>
